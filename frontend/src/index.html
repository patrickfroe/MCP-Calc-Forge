<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculations</title>
    <style>
      :root {
        color-scheme: light dark;
        --app-space: 1rem;
        --host-inset-top: 0px;
        --host-inset-right: 0px;
        --host-inset-bottom: 0px;
        --host-inset-left: 0px;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      main {
        padding-top: max(var(--app-space), env(safe-area-inset-top, 0px), var(--host-inset-top));
        padding-right: max(var(--app-space), env(safe-area-inset-right, 0px), var(--host-inset-right));
        padding-bottom: max(var(--app-space), env(safe-area-inset-bottom, 0px), var(--host-inset-bottom));
        padding-left: max(var(--app-space), env(safe-area-inset-left, 0px), var(--host-inset-left));
      }
      ul {
        padding-left: 1.25rem;
      }
      .muted {
        opacity: 0.75;
      }
      .field {
        margin: 0.75rem 0;
      }
      .field input,
      .field select,
      .field textarea {
        width: min(100%, 30rem);
        padding: 0.4rem;
        box-sizing: border-box;
      }
      .field-help,
      .field-error,
      .status-error,
      .status-success {
        margin: 0.25rem 0 0;
        font-size: 0.9rem;
      }
      .field-error,
      .status-error {
        color: #c62828;
      }
      .status-success {
        color: #2e7d32;
      }
      .result-box {
        border: 1px solid currentColor;
        border-radius: 0.5rem;
        padding: 0.75rem;
        margin-top: 0.75rem;
      }
      dl {
        margin: 0;
      }
      dt {
        font-weight: 600;
      }
      dd {
        margin: 0 0 0.5rem 0;
      }
      .inline-meta {
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main id="app-root"></main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
